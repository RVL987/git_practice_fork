name: pytest

on:
  push:
    branches: [ main ]

jobs:
  test-calculator:
    runs-on: ubuntu-latest
   
    steps:
     - name: Checkout repository code
       uses: actions/checkout@v4

     - name: Set up Python
       uses: actions/setup-python@v5
       with:
         python-version: '3.10'

     - name: Install pytest
       run: pip install pytest
     
     - name: Run pytest
       run: pytest
