name: Advanced Code Quality Analysis

on:
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, reopened ]

permissions:
  pull-requests: write
  contents: read

jobs:
  analyze-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pycodestyle

      - name: Run File Line Limits Check
        run: |
          chmod +x scripts/check_line_limits.sh
          ./scripts/check_line_limits.sh

      - name: Run Docstring Enforcement Check
        run: |
          python scripts/enforce_docstrings.py

      - name: Run Pycodestyle & Report Violations
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          chmod +x scripts/run_pycodestyle.sh
          ./scripts/run_pycodestyle.sh
